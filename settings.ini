# Every item under [variables] is an expression. Numeric expressions are fine.
[program]
formula = grand_total

[values]
# Strict numeric literals. These can be overridden by code or command line.
price = 19.95
quantity = 3
tax_rate = 0.07
discount_rate = 0.05
shipping_floor = 5.00

[variables]
# Variables may refer to other values or formulas in any order.
subtotal = price * quantity
discount = max(0, subtotal * discount_rate)
taxable = subtotal - discount
tax = taxable * tax_rate
shipping = max(shipping_floor, subtotal * 0.03)
grand_total = taxable + tax + shipping
