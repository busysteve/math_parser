# The expression decides which variables exist.
formula = clamp(base * (1 + rate)^years + sin(t), 0, limit) - grand_total

[variables]
unit_price = 19.95
quantity = 3
subtotal = unit_price * quantity
tax_rate = 0.07
tax = subtotal * tax_rate
shipping = max(4.99, subtotal * 0.05)
grand_total = subtotal + tax + shipping
